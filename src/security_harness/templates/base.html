<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security Harness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    body { background: #0d1117; color: #e6edf3; --bs-body-bg: #0d1117; --bs-body-color: #e6edf3; --bs-secondary-color: rgba(230, 237, 243, 0.75); }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .card { background: #161b22; border: 1px solid #30363d; color: #e6edf3; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    .table { --bs-table-bg: transparent; --bs-table-color: #e6edf3; --bs-table-striped-bg: #0d1117; --bs-table-striped-color: #e6edf3; --bs-table-border-color: #30363d; }
    .badge-critical { background: #da3633; }
    .badge-high { background: #d29922; }
    .badge-medium { background: #1f6feb; }
    .badge-low { background: #238636; }
    .worker-card { border-left: 4px solid #238636; }
    .worker-card.busy { border-left-color: #d29922; }
    .worker-card.idle { border-left-color: #30363d; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .progress { background: #30363d; }
    code { color: #79c0ff; }
    pre { background: #0d1117; border: 1px solid #30363d; padding: 1rem; border-radius: 6px; color: #e6edf3; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
    .repro-row:hover { background: #21262d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">&#x1F6E1; Security Harness</span>
      <span class="text-muted small">Live Dashboard</span>
    </div>
  </nav>
  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
